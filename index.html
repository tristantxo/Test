<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gym Plan</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#efefef;
  font-family:DM Sans;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.top{
  padding:16px;
  display:flex;
  justify-content:space-between;
}

.title{font-size:20px;font-weight:600}
.sub{font-size:11px;color:#999;font-family:DM Mono}

/* NAV */
.tabs,.sessions{
  display:flex;
  gap:6px;
  padding:0 16px 10px;
  overflow-x:auto;
}

.tab,.sess{
  font-family:DM Mono;
  font-size:11px;
  padding:6px 10px;
  border-radius:20px;
  border:1px solid #333;
  color:#666;
  white-space:nowrap;
  cursor:pointer;
}

.active{background:#fff;color:#000}
.done{color:#3ddc84;border-color:#3ddc84}

/* CONTENT */
.content{
  flex:1;
  overflow:auto;
  padding:0 14px 20px;
}

.card{
  background:#141414;
  border:1px solid #222;
  border-radius:14px;
  margin-bottom:6px;
}

.card.done{
  border-color:rgba(61,220,132,0.3);
  background:rgba(61,220,132,0.05);
}

.row{
  display:flex;
  justify-content:space-between;
  padding:12px;
  align-items:center;
  cursor:pointer;
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.check{
  width:18px;height:18px;
  border-radius:50%;
  border:1.5px solid #444;
}

.check.on{
  background:#3ddc84;
  border-color:#3ddc84;
}

.name{font-size:14px}
.meta{font-size:11px;color:#888;font-family:DM Mono}

.wt{
  font-family:DM Mono;
  min-width:50px;
  text-align:right;
}

.edit{
  border-bottom:1px dashed #444;
  outline:none;
}
</style>
</head>

<body>

<div class="top">
  <div>
    <div class="title">Gym Plan</div>
    <div class="sub">May – Dec 2026</div>
  </div>
  <div class="sub" id="weekLabel"></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="sessions" id="sessions"></div>

<div class="content" id="content"></div>

<script>

const WEEKS = Array.from({length:35},(_,i)=>({n:i+1}));

const PUSH = [
  {name:'Incline bench',sets:'4×6-8',w:[25,25,25,25,27.5,27.5,27.5,27.5,27.5,30,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,40]},
  {name:'Flat bench',sets:'4×6-8',w:[27.5,27.5,27.5,27.5,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,40,40,40,40,40,40,42.5]},
  {name:'Military press',sets:'3×6-8',w:[32.5,32.5,32.5,32.5,35,35,35,35,37.5,37.5,37.5,37.5,40,40,40,40,42.5,42.5,42.5,42.5,45,45,45,45,47.5,47.5,47.5,47.5,50,50,50,50,52.5,52.5,55]},
  {name:'Cable lateral raise',sets:'4×15-20'},
  {name:'Tricep pushdown',sets:'3×10-15'},
  {name:'Overhead tricep ext',sets:'3×10-15'},
  {name:'Face pull',sets:'3×15-20'}
];

const PULL = [
  {name:'Pull-ups',sets:'4×6-8',w:[15,15,15,15,17.5,17.5,17.5,17.5,20,20,20,20,22.5,22.5,22.5,22.5,25,25,25,25,27.5,27.5,27.5,27.5,30,30,30,30,32.5,32.5,32.5,32.5,35,35,35]},
  {name:'Seated row',sets:'4×6-8'},
  {name:'One arm row',sets:'3×10-12'},
  {name:'Rear delt fly',sets:'4×15-20'},
  {name:'Cable lat raise',sets:'3×15-20'},
  {name:'DB curl',sets:'3×8-12'},
  {name:'Incline curls',sets:'2×10-15'}
];

const SESSIONS=[
  {name:'Chest',ex:PUSH},
  {name:'Back',ex:PULL},
  {name:'Chest',ex:PUSH},
  {name:'Back',ex:PULL}
];

let w=0, s=0;
let state=JSON.parse(localStorage.getItem('gym_state')||'{}');

function key(w,s,i){return `${w}_${s}_${i}`}

function toggle(i){
  const k=key(w,s,i);
  state[k]=!state[k];
  localStorage.setItem('gym_state',JSON.stringify(state));
  render();
}

function isDone(i){
  return !!state[key(w,s,i)];
}

/* NAV */
function setWeek(i){w=i;render();}
function setSession(i){s=i;render();}

/* EDIT SAVE */
function saveEdit(wk,ss,i,field,val){
  const k=`e_${wk}_${ss}_${i}_${field}`;
  state[k]=val;
  localStorage.setItem('gym_state',JSON.stringify(state));
}

function getEdit(wk,ss,i,field,fb){
  return state[`e_${wk}_${ss}_${i}_${field}`] ?? fb;
}

/* RENDER */
function renderTabs(){
  document.getElementById('tabs').innerHTML =
    WEEKS.map((_,i)=>`
      <div class="tab ${i===w?'active':''}" onclick="setWeek(${i})">${i+1}</div>
    `).join('');

  document.getElementById('sessions').innerHTML =
    SESSIONS.map((x,i)=>`
      <div class="sess ${i===s?'active':''}" onclick="setSession(${i})">${x.name}</div>
    `).join('');
}

function render(){

  renderTabs();

  const session=SESSIONS[s];

  document.getElementById('content').innerHTML =
    session.ex.map((e,i)=>{
      const done=isDone(i);

      const sets=getEdit(w,s,i,'sets',e.sets);
      const wt=getEdit(w,s,i,'wt',e.w?e.w[w]||'':'');

      return `
      <div class="card ${done?'done':''}">
        <div class="row" onclick="toggle(${i})">
          
          <div class="left">
            <div class="check ${done?'on':''}"></div>
            <div>
              <div class="name ${done?'done':''}">${e.name}</div>

              <div class="meta edit"
                contenteditable="true"
                onclick="event.stopPropagation()"
                onblur="saveEdit(${w},${s},${i},'sets',this.innerText)"
              >${sets}</div>
            </div>
          </div>

          <div class="wt edit"
            contenteditable="true"
            onclick="event.stopPropagation()"
            onblur="saveEdit(${w},${s},${i},'wt',this.innerText)"
          >
            ${wt}
          </div>

        </div>
      </div>`;
    }).join('');

  document.getElementById('weekLabel').innerText=
    `Week ${w+1} / 35`;
}

render();

</script>

</body>
</html>
