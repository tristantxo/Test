<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Plan">
<meta name="theme-color" content="#0a0a0a">
<title>Gym Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --s1: #141414; --s2: #1e1e1e; --s3: #282828;
  --b1: rgba(255,255,255,0.06); --b2: rgba(255,255,255,0.12); --b3: rgba(255,255,255,0.2);
  --tx: #efefef; --t2: #999; --t3: #555;
  --green: #3ddc84; --gd: rgba(61,220,132,0.15); --gs: rgba(61,220,132,0.07);
  --blue: #5b9cf6; --bd: rgba(91,156,246,0.15);
  --orange: #f0a050;
  --r: 16px; --r2: 10px; --r3: 24px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { height: 100%; }
body {
  background: var(--bg); color: var(--tx); font-family: 'DM Sans', sans-serif;
  display: flex; flex-direction: column; overflow: hidden;
  padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
}

/* TOP */
.topbar { flex-shrink:0; padding: 16px 18px 10px; display:flex; justify-content:space-between; align-items:center; }
.title { font-size:22px; font-weight:600; letter-spacing:-0.4px; }
.subtitle { font-size:11px; color:var(--t2); font-family:'DM Mono',monospace; margin-top:2px; }
.chip { background:var(--s2); border:1px solid var(--b2); border-radius:var(--r3); padding:7px 13px; font-size:12px; font-family:'DM Mono',monospace; color:var(--t2); text-align:center; line-height:1.5; }
.chip em { color:var(--green); font-style:normal; font-weight:500; }

/* WEEK TABS */
.tabs-wrap { flex-shrink:0; padding: 4px 0 8px; }
.tabs { display:flex; gap:5px; padding:0 18px; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:5px 11px; border-radius:var(--r3); border:1px solid var(--b1); background:transparent; color:var(--t3); font-size:11px; font-family:'DM Mono',monospace; cursor:pointer; transition:all 0.15s; user-select:none; }
.tab.done { color:var(--green); border-color:rgba(61,220,132,0.25); }
.tab.active { background:var(--tx); color:var(--bg); border-color:transparent; font-weight:500; }
.tab.done.active { background:var(--green); color:#000; }

/* SESSION TABS */
.stabs { flex-shrink:0; display:flex; gap:6px; padding:0 18px 10px; }
.stab { flex:1; padding:8px 4px; border-radius:var(--r2); border:1px solid var(--b1); background:transparent; color:var(--t3); font-size:11px; font-family:'DM Mono',monospace; cursor:pointer; transition:all 0.15s; text-align:center; user-select:none; position:relative; }
.stab.done { color:var(--green); border-color:rgba(61,220,132,0.3); }
.stab.active { background:var(--s2); color:var(--tx); border-color:var(--b2); }
.stab.done.active { background:var(--gd); color:var(--green); border-color:rgba(61,220,132,0.4); }
.stab-dot { width:5px; height:5px; border-radius:50%; background:var(--green); position:absolute; top:5px; right:5px; display:none; }
.stab.done .stab-dot { display:block; }
.stab.done.active .stab-dot { display:none; }

/* SCROLL */
.scroll { flex:1; overflow-y:auto; padding:0 14px 20px; -webkit-overflow-scrolling:touch; }

/* WEEK SUMMARY */
.wsummary { background:var(--s1); border:1px solid var(--b1); border-radius:var(--r); padding:14px 16px; margin-bottom:12px; }
.ws-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.ws-title { font-size:16px; font-weight:600; letter-spacing:-0.3px; }
.ws-date { font-size:11px; color:var(--t2); font-family:'DM Mono',monospace; margin-top:3px; }
.badge { font-size:10px; font-weight:500; padding:3px 9px; border-radius:var(--r3); font-family:'DM Mono',monospace; }
.b-done { background:var(--gd); color:var(--green); border:1px solid rgba(61,220,132,0.3); }
.b-cur  { background:var(--bd); color:var(--blue);  border:1px solid rgba(91,156,246,0.3); }
.b-todo { background:var(--s3); color:var(--t2);    border:1px solid var(--b2); }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:10px; }
.stat { background:var(--s2); border-radius:var(--r2); padding:8px 6px; text-align:center; }
.stat-n { font-size:17px; font-weight:600; font-family:'DM Mono',monospace; }
.stat-n.g { color:var(--green); } .stat-n.o { color:var(--orange); }
.stat-l { font-size:9px; color:var(--t2); text-transform:uppercase; letter-spacing:0.06em; margin-top:1px; }
.prog { height:3px; background:var(--s3); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:var(--green); border-radius:2px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); }

/* SESSION HEADER */
.sh { display:flex; justify-content:space-between; align-items:center; padding:4px 2px 8px; }
.sh-title { font-size:11px; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:0.08em; font-family:'DM Mono',monospace; }
.sh-prog { font-size:11px; color:var(--t3); font-family:'DM Mono',monospace; }

/* EXERCISE CARDS */
.ex-card { background:var(--s1); border:1px solid var(--b1); border-radius:var(--r); margin-bottom:6px; overflow:hidden; transition:border-color 0.2s, background 0.2s; }
.ex-card.checked { border-color:rgba(61,220,132,0.2); background:var(--gs); }
.ex-row { display:flex; align-items:center; padding:12px 14px; gap:11px; cursor:pointer; user-select:none; }
.ex-row:active { opacity:0.7; }
.chk { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--b3); flex-shrink:0; position:relative; transition:all 0.2s; }
.chk.on { background:var(--green); border-color:var(--green); box-shadow:0 0 0 3px rgba(61,220,132,0.15); }
.chk.on::after { content:''; position:absolute; left:6px; top:4px; width:7px; height:4px; border-left:2px solid #000; border-bottom:2px solid #000; transform:rotate(-45deg); }
.ex-body { flex:1; min-width:0; }
.ex-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:opacity 0.2s; }
.ex-name.done { opacity:0.3; text-decoration:line-through; }
.ex-sets { font-size:11px; color:var(--t2); font-family:'DM Mono',monospace; border-bottom:1px dashed var(--t3); outline:none; min-width:30px; margin-top:3px; display:inline-block; }
.ex-sets:focus { border-color:var(--blue); color:var(--tx); }
.ex-right { flex-shrink:0; text-align:right; }
.ex-wt { display:flex; align-items:baseline; gap:2px; justify-content:flex-end; }
.ex-wt-v { font-size:15px; font-weight:600; font-family:'DM Mono',monospace; border-bottom:1px dashed var(--t3); outline:none; min-width:28px; text-align:right; }
.ex-wt-v:focus { border-color:var(--blue); }
.ex-wt-u { font-size:10px; color:var(--t3); }
.ex-wt-na { font-size:11px; color:var(--t3); font-family:'DM Mono',monospace; }

/* NAV */
.nav { flex-shrink:0; display:flex; gap:8px; padding:8px 14px 10px; border-top:1px solid var(--b1); background:var(--bg); }
.nav-btn { flex:1; padding:13px 8px; border:1px solid var(--b2); border-radius:var(--r2); background:transparent; color:var(--tx); font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background 0.15s; user-select:none; }
.nav-btn:active { background:var(--s2); }
.nav-btn:disabled { opacity:0.2; cursor:default; }
.nav-c { flex:2; font-family:'DM Mono',monospace; font-size:11px; color:var(--t2); border-color:transparent; pointer-events:none; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="title">Gym Plan</div>
    <div class="subtitle">Apr – Dec 2026</div>
  </div>
  <div class="chip" id="chip">— / 39<br>weeks</div>
</div>

<div class="tabs-wrap"><div class="tabs" id="wtabs"></div></div>
<div class="stabs" id="stabs"></div>

<div class="scroll" id="scroll">
  <div id="content"></div>
</div>

<div class="nav">
  <button class="nav-btn" id="prev" onclick="changeWeek(-1)">← Prev</button>
  <button class="nav-btn nav-c" id="nlabel"></button>
  <button class="nav-btn" id="next" onclick="changeWeek(1)">Next →</button>
</div>

<script>
const WEEKS=[{n:1,d:'04 Apr'},{n:2,d:'11 Apr'},{n:3,d:'18 Apr'},{n:4,d:'25 Apr'},{n:5,d:'02 May'},{n:6,d:'09 May'},{n:7,d:'16 May'},{n:8,d:'23 May'},{n:9,d:'30 May'},{n:10,d:'06 Jun'},{n:11,d:'13 Jun'},{n:12,d:'20 Jun'},{n:13,d:'27 Jun'},{n:14,d:'04 Jul'},{n:15,d:'11 Jul'},{n:16,d:'18 Jul'},{n:17,d:'25 Jul'},{n:18,d:'01 Aug'},{n:19,d:'08 Aug'},{n:20,d:'15 Aug'},{n:21,d:'22 Aug'},{n:22,d:'29 Aug'},{n:23,d:'05 Sep'},{n:24,d:'12 Sep'},{n:25,d:'19 Sep'},{n:26,d:'26 Sep'},{n:27,d:'03 Oct'},{n:28,d:'10 Oct'},{n:29,d:'17 Oct'},{n:30,d:'24 Oct'},{n:31,d:'31 Oct'},{n:32,d:'07 Nov'},{n:33,d:'14 Nov'},{n:34,d:'21 Nov'},{n:35,d:'28 Nov'},{n:36,d:'05 Dec'},{n:37,d:'12 Dec'},{n:38,d:'19 Dec'},{n:39,d:'26 Dec'}];
const BW=[77,77,77,77,77,78,78,78,78,78,79,79,79,79,79,79,80,80,80,80,80,81,81,81,81,81,81,82,82,82,82,82,82,83,83,83,83,83,83];

const PUSH=[
  {name:'Inc bench press',sets:'4×6-8',w:[25,25,25,25,27.5,27.5,27.5,27.5,27.5,30,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,37.5,40,40,40,40]},
  {name:'Flat bench press',sets:'4×6-8',w:[27.5,27.5,27.5,27.5,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,37.5,40,40,40,40,40,40,40,42.5,42.5,42.5,42.5]},
  {name:'Military press',sets:'3×6-8',w:[32.5,32.5,32.5,32.5,35,35,35,35,37.5,37.5,37.5,37.5,40,40,40,40,42.5,42.5,42.5,42.5,45,45,45,45,47.5,47.5,47.5,47.5,50,50,50,50,52.5,52.5,52.5,52.5,55,55,55]},
  {name:'Cable lateral raise',sets:'4×15-20',w:null},
  {name:'OH tricep ext',sets:'3×10-15',w:null},
  {name:'Tricep pushdown',sets:'3×10-15',w:null},
  {name:'Face pull',sets:'3×15-20',w:null},
];
const PULL=[
  {name:'Pull-ups',sets:'4×6-8',w:[15,15,15,15,17.5,17.5,17.5,17.5,20,20,20,20,22.5,22.5,22.5,22.5,25,25,25,25,27.5,27.5,27.5,27.5,30,30,30,30,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35]},
  {name:'Seated row',sets:'4×6-8',w:null},
  {name:'One arm cable row',sets:'3×10-12',w:null},
  {name:'Rear delt fly',sets:'4×15-20',w:null},
  {name:'Cable lat raise',sets:'3×15-20',w:null},
  {name:'DB curl',sets:'3×8-12',w:null},
  {name:'Inc DB curls',sets:'2×10-15',w:null},
];

const SESSIONS=[
  {id:'s1',label:'S1·Push',long:'Session 1 · Push',ex:PUSH},
  {id:'s2',label:'S2·Pull',long:'Session 2 · Pull',ex:PULL},
  {id:'s3',label:'S3·Push',long:'Session 3 · Push',ex:PUSH},
  {id:'s4',label:'S4·Pull',long:'Session 4 · Pull',ex:PULL},
];
const SPW=7, TPW=28; // sessions per session, total per week

let ST={}, cur=0, cs=0;

function load(){try{ST=JSON.parse(localStorage.getItem('gym_v2')||'{}');}catch(e){ST={};}}
function save(){try{localStorage.setItem('gym_v2',JSON.stringify(ST));}catch(e){}}

function ek(w,s,n){return w+'|'+s+'|'+n;}
function ck(w,s,n,f){return w+'|'+s+'|'+n+'|'+f;}
function isDone(w,s,n){return !!ST[ek(w,s,n)];}
function toggle(w,s,n){ST[ek(w,s,n)]=!ST[ek(w,s,n)];save();render();}
function setC(w,s,n,f,v){ST[ck(w,s,n,f)]=v;save();}
function getC(w,s,n,f,fb){const v=ST[ck(w,s,n,f)];return(v!==undefined&&v!=='')? v:fb;}

function sDone(w,sid){return SESSIONS.find(x=>x.id===sid).ex.filter(e=>isDone(w,sid,e.name)).length;}
function sComp(w,sid){return sDone(w,sid)===SPW;}
function wDone(w){return SESSIONS.reduce((a,s)=>a+sDone(w,s.id),0);}
function wComp(w){return wDone(w)===TPW;}

function curWeek(){
  const now=new Date(),mo={Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  for(let i=WEEKS.length-1;i>=0;i--){
    const[d,m]=WEEKS[i].d.split(' ');
    if(now>=new Date(2026,mo[m],+d))return i;
  }
  return 0;
}
function findStart(){
  // Find the latest week with any activity
  for(let i=WEEKS.length-1;i>=0;i--)if(wDone(i)>0)return i;
  // No activity yet — just use current calendar week
  return curWeek();
}

function render(){
  // chip
  const done=WEEKS.filter((_,i)=>wComp(i)).length;
  document.getElementById('chip').innerHTML=`<em>${done}</em> / 39<br>weeks`;

  // week tabs
  const wt=document.getElementById('wtabs');
  wt.innerHTML=WEEKS.map((w,i)=>{
    let c='tab';
    if(wComp(i))c+=' done';
    if(i===cur)c+=' active';
    return `<button class="${c}" onclick="goWeek(${i})">W${w.n}</button>`;
  }).join('');
  setTimeout(()=>{const a=wt.querySelectorAll('.tab')[cur];if(a)a.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});},50);

  // session tabs
  document.getElementById('stabs').innerHTML=SESSIONS.map((s,i)=>{
    let c='stab';
    if(sComp(cur,s.id))c+=' done';
    if(i===cs)c+=' active';
    return `<button class="${c}" onclick="goSess(${i})"><div class="stab-dot"></div>${s.label}</button>`;
  }).join('');

  // content
  const w=WEEKS[cur],s=SESSIONS[cs];
  const td=wDone(cur),pct=Math.round(td/TPW*100);
  const sd=sDone(cur,s.id);
  const isCur=curWeek()===cur,allDone=wComp(cur);
  const badge=allDone?`<span class="badge b-done">✓ Complete</span>`:isCur?`<span class="badge b-cur">This week</span>`:`<span class="badge b-todo">Upcoming</span>`;

  const rows=s.ex.map(ex=>{
    const done=isDone(cur,s.id,ex.name);
    const dWt=ex.w?ex.w[cur]:'';
    const sets=getC(cur,s.id,ex.name,'sets',ex.sets);
    const wt=getC(cur,s.id,ex.name,'wt',dWt);
    return `<div class="ex-card${done?' checked':''}">
      <div class="ex-row" onclick="toggle(${cur},'${s.id}','${ex.name}')">
        <div class="chk${done?' on':''}"></div>
        <div class="ex-body">
          <div class="ex-name${done?' done':''}">${ex.name}</div>
          <div class="ex-sets" contenteditable="true"
            onclick="event.stopPropagation()"
            onblur="setC(${cur},'${s.id}','${ex.name}','sets',this.innerText)"
          >${sets}</div>
        </div>
        <div class="ex-right" onclick="event.stopPropagation()">
          ${wt!==''?`<div class="ex-wt"><div class="ex-wt-v" contenteditable="true" onblur="setC(${cur},'${s.id}','${ex.name}','wt',this.innerText)">${wt}</div><span class="ex-wt-u">kg</span></div>`:`<div class="ex-wt-na">TBD</div>`}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
    <div class="wsummary">
      <div class="ws-top">
        <div>
          <div class="ws-title">Week ${w.n} <span style="font-size:13px;color:var(--t2);font-weight:400;font-family:'DM Mono',monospace">· ${BW[cur]} kg</span></div>
          <div class="ws-date">w/c ${w.d} 2026</div>
        </div>
        ${badge}
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n${td>0?' g':''}">${td}</div><div class="stat-l">Done</div></div>
        <div class="stat"><div class="stat-n">${TPW-td}</div><div class="stat-l">Left</div></div>
        <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">Week</div></div>
        <div class="stat"><div class="stat-n${sd===SPW?' g':sd>0?' o':''}">${sd}/${SPW}</div><div class="stat-l">Session</div></div>
      </div>
      <div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="sh">
      <div class="sh-title">${s.long}</div>
      <div class="sh-prog">${sd} / ${SPW}</div>
    </div>
    ${rows}`;

  document.getElementById('scroll').scrollTop=0;
  document.getElementById('nlabel').textContent=`Week ${cur+1} of 39`;
  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===WEEKS.length-1;
}

function goWeek(i){cur=i;render();}
function goSess(i){cs=i;render();}
function changeWeek(d){cur=Math.max(0,Math.min(WEEKS.length-1,cur+d));render();}



load(); cur=findStart(); render();
</script>
</body>
</html>
