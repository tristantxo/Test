<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Plan">
<meta name="theme-color" content="#0a0a0a">
<title>Gym Plan</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0a0a;
  --s1:#141414;
  --s2:#1e1e1e;
  --s3:#282828;

  --b1:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.12);
  --b3:rgba(255,255,255,0.2);

  --tx:#efefef;
  --t2:#999;
  --t3:#555;

  --green:#3ddc84;
  --gd:rgba(61,220,132,0.15);
  --gs:rgba(61,220,132,0.07);

  --blue:#5b9cf6;
  --orange:#f0a050;

  --r:16px;
  --r2:10px;
  --r3:24px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);
  color:var(--tx);
  font-family:'DM Sans',sans-serif;
  display:flex;
  flex-direction:column;
  height:100%;
  overflow:hidden;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 18px 10px;
}
.title{font-size:22px;font-weight:600;}
.subtitle{font-size:11px;color:var(--t2);font-family:'DM Mono';}

.chip{
  font-family:'DM Mono';
  font-size:12px;
  padding:7px 13px;
  border-radius:24px;
  background:var(--s2);
  border:1px solid var(--b2);
  color:var(--t2);
}
.chip em{color:var(--green);font-style:normal}

/* TABS */
.tabs{display:flex;gap:5px;overflow-x:auto;padding:0 18px 8px;}
.tab{
  font-family:'DM Mono';
  font-size:12px;                    /* increased from 11px */
  padding:8px 14px;                  /* increased for touch */
  border-radius:24px;
  border:1px solid var(--b1);
  color:var(--t3);
  background:transparent;
  cursor:pointer;
  transition:background 0.15s, color 0.15s;
  user-select:none;
}
.tab:active{background:var(--s2);}
.tab.active{background:#fff;color:#000;}
.tab.done{color:var(--green);border-color:rgba(61,220,132,0.25);}

/* SESSION */
.stabs{display:flex;gap:6px;padding:0 18px 10px;}
.stab{
  flex:1;
  font-size:12px;                    /* increased from 11px */
  font-family:'DM Mono';
  border:1px solid var(--b1);
  padding:10px 4px;                  /* increased */
  border-radius:10px;
  text-align:center;
  color:var(--t3);
  cursor:pointer;
  transition:background 0.15s, color 0.15s;
  user-select:none;
}
.stab:active{background:var(--s2);}
.stab.active{background:var(--s2);color:#fff;}

/* CONTENT */
.scroll{flex:1;overflow-y:auto;padding:0 14px;}

.card{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:16px;
  margin-bottom:6px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:12px 14px;
}

.name{font-size:14px;}
.meta{font-size:11px;color:var(--t2);font-family:'DM Mono';}

.wt{
  font-family:'DM Mono';
  font-weight:600;
  font-size:16px;
  color:var(--tx);
}
.wt.missing{color:var(--t3); font-weight:400;}
</style>
</head>

<body>

<div class="topbar">
  <div>
    <div class="title">Gym Plan</div>
    <div class="subtitle">May – Dec 2026</div>
  </div>
  <div class="chip" id="chip">— / 35<br>weeks</div>
</div>

<div class="tabs" id="wtabs"></div>
<div class="stabs" id="stabs"></div>

<div class="scroll">
  <div id="content"></div>
</div>

<script>

const WEEKS=[
  {n:1,d:'04 May'},{n:2,d:'11 May'},{n:3,d:'18 May'},{n:4,d:'25 May'},
  {n:5,d:'01 Jun'},{n:6,d:'08 Jun'},{n:7,d:'15 Jun'},{n:8,d:'22 Jun'},
  {n:9,d:'29 Jun'},{n:10,d:'06 Jul'},{n:11,d:'13 Jul'},{n:12,d:'20 Jul'},
  {n:13,d:'27 Jul'},{n:14,d:'03 Aug'},{n:15,d:'10 Aug'},{n:16,d:'17 Aug'},
  {n:17,d:'24 Aug'},{n:18,d:'31 Aug'},{n:19,d:'07 Sep'},{n:20,d:'14 Sep'},
  {n:21,d:'21 Sep'},{n:22,d:'28 Sep'},{n:23,d:'05 Oct'},{n:24,d:'12 Oct'},
  {n:25,d:'19 Oct'},{n:26,d:'26 Oct'},{n:27,d:'02 Nov'},{n:28,d:'09 Nov'},
  {n:29,d:'16 Nov'},{n:30,d:'23 Nov'},{n:31,d:'30 Nov'},{n:32,d:'07 Dec'},
  {n:33,d:'14 Dec'},{n:34,d:'21 Dec'},{n:35,d:'28 Dec'}
];

const PUSH=[
  {name:'Incline bench',sets:'4×6-8',w:[25,25,25,25,27.5,27.5,27.5,27.5,27.5,30,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,40]},
  {name:'Flat bench',sets:'4×6-8',w:[27.5,27.5,27.5,27.5,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,40,40,40,40,40,40,42.5]},
  {name:'Military press',sets:'3×6-8',w:[32.5,32.5,32.5,32.5,35,35,35,35,37.5,37.5,37.5,37.5,40,40,40,40,42.5,42.5,42.5,42.5,45,45,45,45,47.5,47.5,47.5,47.5,50,50,50,50,52.5,52.5,55]},
];

const PULL=[
  {name:'Pull-ups',sets:'4×6-8',w:[15,15,15,15,17.5,17.5,17.5,17.5,20,20,20,20,22.5,22.5,22.5,22.5,25,25,25,25,27.5,27.5,27.5,27.5,30,30,30,30,32.5,32.5,32.5,32.5,35,35,35]},
  {name:'Seated row',sets:'4×6-8',w:null},
  {name:'DB curl',sets:'3×8-12',w:null},
];

const SESSIONS=[
  {id:'s1',label:'Chest',ex:PUSH},
  {id:'s2',label:'Back',ex:PULL},
  {id:'s3',label:'Chest',ex:PUSH},
  {id:'s4',label:'Back',ex:PULL},
];

// State: load from localStorage or start at week 0, session 0
let cur = parseInt(localStorage.getItem('gym_cur') || '0');
let cs = parseInt(localStorage.getItem('gym_cs') || '0');

// Validate range
if (cur < 0 || cur >= WEEKS.length) cur = 0;
if (cs < 0 || cs >= SESSIONS.length) cs = 0;

function saveState(){
  localStorage.setItem('gym_cur', cur);
  localStorage.setItem('gym_cs', cs);
}

function renderTabs(){
  document.getElementById('wtabs').innerHTML =
    WEEKS.map((w,i)=>`<div class="tab ${i===cur?'active':''}">${w.n}</div>`).join('');

  document.getElementById('stabs').innerHTML =
    SESSIONS.map((s,i)=>`<div class="stab ${i===cs?'active':''}">${s.label}</div>`).join('');
}

function render(){
  renderTabs();

  const s = SESSIONS[cs];

  document.getElementById('content').innerHTML =
    s.ex.map(e => {
      let weightHTML = '';
      if (e.w && e.w[cur] !== undefined) {
        weightHTML = `${e.w[cur]} kg`;
      } else {
        weightHTML = '—';
      }
      // Add a class when missing to style differently
      const wtClass = (e.w && e.w[cur] !== undefined) ? 'wt' : 'wt missing';
      return `
        <div class="card">
          <div class="row">
            <div>
              <div class="name">${e.name}</div>
              <div class="meta">${e.sets}</div>
            </div>
            <div class="${wtClass}">${weightHTML}</div>
          </div>
        </div>
      `;
    }).join('');

  document.getElementById('chip').innerHTML =
    `<em>${cur+1}</em> / 35<br>weeks`;
}

// Event delegation for week tabs
document.getElementById('wtabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const children = [...e.currentTarget.children];
  const idx = children.indexOf(tab);
  if (idx >= 0 && idx !== cur) {
    cur = idx;
    saveState();
    render();
  }
});

// Event delegation for session tabs
document.getElementById('stabs').addEventListener('click', (e) => {
  const stab = e.target.closest('.stab');
  if (!stab) return;
  const children = [...e.currentTarget.children];
  const idx = children.indexOf(stab);
  if (idx >= 0 && idx !== cs) {
    cs = idx;
    saveState();
    render();
  }
});

// Initial render
render();

</script>

</body>
</html>
