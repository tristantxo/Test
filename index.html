<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Plan">
<meta name="theme-color" content="#0f0f0f">
<title>Gym Plan by Tristatxo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --faint: #555;
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.12);
    --green-dim: rgba(74,222,128,0.06);
    --blue: #60a5fa;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body { 
    height: 100%; 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'DM Sans', sans-serif; 
    overflow: hidden; 
    overscroll-behavior-y: contain; 
  }
  
  body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

  .topbar { padding: 18px 20px 12px; flex-shrink: 0; }
  .topbar-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .app-title { font-size: 26px; font-weight: 600; }
  .overall-chip { background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 6px 12px; font-size: 12px; font-family: 'DM Mono', monospace; text-align: right; }
  .overall-chip span { color: var(--green); }

  .tabs-wrap { flex-shrink: 0; padding: 8px 0 10px; }
  .tabs { display: flex; gap: 6px; padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; }
  .tab.active { background: var(--text); color: var(--bg); border-color: transparent; }
  .tab.done { border-color: rgba(74,222,128,0.3); color: var(--green); }

  .scroll { flex: 1; overflow-y: auto; padding: 0 16px 24px; -webkit-overflow-scrolling: touch; }

  .week-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .wh-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .wh-date { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
  .stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 8px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }

  .prog-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--green); transition: width 0.3s; }

  .section-label { font-size: 10px; font-weight: 600; color: var(--faint); letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 4px 6px; }
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; }
  .ex-row { display: flex; align-items: center; padding: 13px 14px; gap: 12px; }
  
  .chk { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); position: relative; flex-shrink: 0; }
  .chk.on { background: var(--green); border-color: var(--green); }
  .chk.on::after { content: ''; position: absolute; left: 6px; top: 4px; width: 8px; height: 5px; border-left: 2px solid #0f0f0f; border-bottom: 2px solid #0f0f0f; transform: rotate(-45deg); }
  
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ex-name.done { opacity: 0.35; text-decoration: line-through; }
  
  /* Editable field styles */
  .editable { border-bottom: 1px dashed var(--faint); outline: none; }
  .editable:focus { border-bottom-color: var(--blue); color: var(--blue); }
  .ex-sets { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; display: inline-block; }
  .ex-wt { text-align: right; font-family: 'DM Mono', monospace; min-width: 45px; }

  .nav { flex-shrink: 0; display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); }
  .nav-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); border: none; font-family: 'DM Mono', monospace; font-size: 12px; }
  .nav-btn:disabled { opacity: 0.3; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div><div class="app-title">Gym Plans by Tristantxo</div><div class="app-sub">2026 Schedule</div></div>
    <div class="overall-chip" id="overall-chip">0 / 39</div>
  </div>
</div>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="scroll" id="scroll"><div id="week-content"></div></div>

<div class="nav">
  <button class="nav-btn" onclick="changeWeek(-1)">← PREV</button>
  <button class="nav-btn" id="nav-label" style="background:none; pointer-events:none"></button>
  <button class="nav-btn" onclick="changeWeek(1)">NEXT →</button>
</div>

<script>
const WEEKS = [{n:1,date:'04 Apr'},{n:2,date:'11 Apr'},{n:3,date:'18 Apr'},{n:4,date:'25 Apr'},{n:5,date:'02 May'},{n:6,date:'09 May'},{n:7,date:'16 May'},{n:8,date:'23 May'},{n:9,date:'30 May'},{n:10,date:'06 Jun'},{n:11,date:'13 Jun'},{n:12,date:'20 Jun'},{n:13,date:'27 Jun'},{n:14,date:'04 Jul'},{n:15,date:'11 Jul'},{n:16,date:'18 Jul'},{n:17,date:'25 Jul'},{n:18,date:'01 Aug'},{n:19,date:'08 Aug'},{n:20,date:'15 Aug'},{n:21,date:'22 Aug'},{n:22,date:'29 Aug'},{n:23,date:'05 Sep'},{n:24,date:'12 Sep'},{n:25,date:'19 Sep'},{n:26,date:'26 Sep'},{n:27,date:'03 Oct'},{n:28,date:'10 Oct'},{n:29,date:'17 Oct'},{n:30,date:'24 Oct'},{n:31,date:'31 Oct'},{n:32,date:'07 Nov'},{n:33,date:'14 Nov'},{n:34,date:'21 Nov'},{n:35,date:'28 Nov'},{n:36,date:'05 Dec'},{n:37,date:'12 Dec'},{n:38,date:'19 Dec'},{n:39,date:'26 Dec'}];
const WEIGHTS = [77,77,77,77,77,78,78,78,78,78,79,79,79,79,79,79,80,80,80,80,80,81,81,81,81,81,81,82,82,82,82,82,82,83,83,83,83,83,83];

const PUSH = [
  {name:'Inc bench press',sets:'4×6-8',w:[25,25,25,25,27.5,27.5,27.5,27.5,27.5,30,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,37.5,40,40,40,40]},
  {name:'Flat bench press',sets:'4×6-8',w:[27.5,27.5,27.5,27.5,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,37.5,40,40,40,40,40,40,40,42.5,42.5,42.5,42.5]},
  {name:'Military press',sets:'3×6-8',w:[32.5,32.5,32.5,32.5,35,35,35,35,37.5,37.5,37.5,37.5,40,40,40,40,42.5,42.5,42.5,42.5,45,45,45,45,47.5,47.5,47.5,47.5,50,50,50,50,52.5,52.5,52.5,52.5,55,55,55]},
  {name:'Cable lateral raise',sets:'4×15-20'},{name:'OH tricep ext',sets:'3×10-15'},{name:'Tricep pushdown',sets:'3×10-15'},{name:'Face pull',sets:'3×15-20'}
];
const PULL = [
  {name:'Pull-ups',sets:'4×6-8',w:[15,15,15,15,17.5,17.5,17.5,17.5,20,20,20,20,22.5,22.5,22.5,22.5,25,25,25,25,27.5,27.5,27.5,27.5,30,30,30,30,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35]},
  {name:'Seated row',sets:'4×6-8'},{name:'One arm cable row',sets:'3×10-12'},{name:'Rear delt fly',sets:'4×15-20'},{name:'Cable lat raise',sets:'3×15-20'},{name:'DB curl',sets:'3×8-12'},{name:'Inc DB curls',sets:'2×10-15'}
];
const ALL_EX = [...PUSH, ...PULL];

let state = {};
let cur = 0;

function load() { state = JSON.parse(localStorage.getItem('gym_v1') || '{}'); }
function save() { localStorage.setItem('gym_v1', JSON.stringify(state)); }

function isDone(wi, name) { return !!state[wi + '|' + name]; }

function toggle(wi, name) { 
    state[wi + '|' + name] = !isDone(wi, name); 
    save(); 
    render(); 
}

// Logic to save manual edits to sets or weight
function updateValue(wi, name, type, val) {
    state[wi + '|' + name + '|' + type] = val;
    save();
}

function hasRecord(wi) { return ALL_EX.some(e => isDone(wi, e.name)); }
function weekDone(wi) { return ALL_EX.every(e => isDone(wi, e.name)); }

function findLatestWithRecord() {
  for (let i = WEEKS.length - 1; i >= 0; i--) {
    if (hasRecord(i)) return i;
  }
  return 0;
}

function render() {
  const completed = WEEKS.filter((_, i) => weekDone(i)).length;
  document.getElementById('overall-chip').innerHTML = `<span>${completed}</span> / 39`;
  document.getElementById('nav-label').textContent = `WEEK ${cur+1}`;
  
  document.getElementById('tabs').innerHTML = WEEKS.map((w, i) => 
    `<button class="tab ${i===cur?'active':''} ${weekDone(i)?'done':''}" onclick="cur=${i};render()">W${w.n}</button>`
  ).join('');

  const doneCount = ALL_EX.filter(e => isDone(cur, e.name)).length;
  const pct = Math.round((doneCount / ALL_EX.length) * 100);

  function rows(list) {
    return list.map(ex => {
      const checked = isDone(cur, ex.name);
      
      // Check for manually edited values first, then default to original array
      const currentSets = state[cur + '|' + ex.name + '|sets'] || ex.sets;
      let currentWt = state[cur + '|' + ex.name + '|wt'] || (ex.w ? ex.w[cur] : '');

      return `
        <div class="ex-card">
          <div class="ex-row">
            <div class="chk ${checked?'on':''}" onclick="toggle(${cur}, '${ex.name}')"></div>
            <div class="ex-info" onclick="toggle(${cur}, '${ex.name}')">
              <div class="ex-name ${checked?'done':''}">${ex.name}</div>
              <div class="ex-sets editable" contenteditable="true" 
                   onblur="updateValue(${cur}, '${ex.name}', 'sets', this.innerText)" 
                   onclick="event.stopPropagation()">${currentSets}</div>
            </div>
            <div class="ex-wt">
                <span class="editable" contenteditable="true" 
                      onblur="updateValue(${cur}, '${ex.name}', 'wt', this.innerText)" 
                      onclick="event.stopPropagation()">${currentWt}</span><span style="font-size:9px;color:var(--faint)">${currentWt ? 'kg' : ''}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('week-content').innerHTML = `
    <div class="week-header">
      <div class="wh-title">Week ${cur+1} · ${WEIGHTS[cur]}kg</div>
      <div class="wh-date">w/c ${WEEKS[cur].date} 2026</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-val">${doneCount}</div><div class="stat-label">Done</div></div>
        <div class="stat"><div class="stat-val">${ALL_EX.length - doneCount}</div><div class="stat-label">Left</div></div>
        <div class="stat"><div class="stat-val">${pct}%</div><div class="stat-label">Goal</div></div>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="section-label">Push</div>${rows(PUSH)}
    <div class="section-label">Pull</div>${rows(PULL)}
  `;

  setTimeout(() => {
    const activeTab = document.querySelector('.tab.active');
    if(activeTab) activeTab.scrollIntoView({inline:'center', behavior:'smooth'});
  }, 50);
}

function changeWeek(d) { cur = Math.max(0, Math.min(WEEKS.length - 1, cur + d)); render(); }

load();
cur = findLatestWithRecord(); 
render();
</script>
</body>
</html>
