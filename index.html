<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gym Plan</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#efefef;
  font-family:DM Sans;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.top{
  padding:16px;
  display:flex;
  justify-content:space-between;
}

.title{font-size:20px;font-weight:600;}
.sub{font-size:11px;color:#999;font-family:DM Mono;}

.tabs,.sessions{
  display:flex;
  gap:6px;
  padding:0 16px 10px;
  overflow-x:auto;
}

.tab,.sess{
  font-family:DM Mono;
  font-size:11px;
  padding:6px 10px;
  border-radius:20px;
  border:1px solid #333;
  color:#666;
  white-space:nowrap;
}

.active{background:#fff;color:#000;}

.done{color:#3ddc84;border-color:#3ddc84;}

.content{
  flex:1;
  overflow:auto;
  padding:0 14px 20px;
}

.card{
  background:#141414;
  border:1px solid #222;
  border-radius:14px;
  margin-bottom:6px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:12px;
}

.name{font-size:14px;}
.meta{font-size:11px;color:#888;font-family:DM Mono;}
.wt{font-family:DM Mono;}
</style>
</head>

<body>

<div class="top">
  <div>
    <div class="title">Gym Plan</div>
    <div class="sub">May – Dec 2026</div>
  </div>
  <div class="sub" id="week">1 / 35</div>
</div>

<div class="tabs" id="tabs"></div>
<div class="sessions" id="sessions"></div>

<div class="content" id="content"></div>

<script>

const WEEKS = Array.from({length:35},(_,i)=>({
  n:i+1,
  d:new Date(2026,4,4+i*7).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
}));

const PUSH = [
  {name:'Incline bench',sets:'4×6-8',w:[25,25,25,25,27.5,27.5,27.5,27.5,27.5,30,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,40]},
  {name:'Flat bench',sets:'4×6-8',w:[27.5,27.5,27.5,27.5,30,30,30,30,30,32.5,32.5,32.5,32.5,32.5,32.5,35,35,35,35,35,35,37.5,37.5,37.5,37.5,37.5,37.5,40,40,40,40,40,40,42.5]},
  {name:'Military press',sets:'3×6-8',w:[32.5,32.5,32.5,32.5,35,35,35,35,37.5,37.5,37.5,37.5,40,40,40,40,42.5,42.5,42.5,42.5,45,45,45,45,47.5,47.5,47.5,47.5,50,50,50,50,52.5,52.5,55]},

  // accessories (no progression)
  {name:'Cable lateral raise',sets:'4×15-20'},
  {name:'Tricep pushdown',sets:'3×10-15'},
  {name:'Overhead tricep ext',sets:'3×10-15'},
  {name:'Face pull',sets:'3×15-20'}
];

const PULL = [
  {name:'Pull-ups',sets:'4×6-8',w:[15,15,15,15,17.5,17.5,17.5,17.5,20,20,20,20,22.5,22.5,22.5,22.5,25,25,25,25,27.5,27.5,27.5,27.5,30,30,30,30,32.5,32.5,32.5,32.5,35,35,35]},
  {name:'Seated row',sets:'4×6-8'},
  {name:'One arm row',sets:'3×10-12'},
  {name:'Rear delt fly',sets:'4×15-20'},
  {name:'Cable lat raise',sets:'3×15-20'},
  {name:'DB curl',sets:'3×8-12'},
  {name:'Incline curls',sets:'2×10-15'}
];

const SESSIONS = [
  {name:'Chest',ex:PUSH},
  {name:'Back',ex:PULL},
  {name:'Chest',ex:PUSH},
  {name:'Back',ex:PULL}
];

let w=0,s=0;

function renderTabs(){
  document.getElementById('tabs').innerHTML =
    WEEKS.map((_,i)=>`
      <div class="tab ${i===w?'active':''}">${i+1}</div>
    `).join('');

  document.getElementById('sessions').innerHTML =
    SESSIONS.map((x,i)=>`
      <div class="sess ${i===s?'active':''}">${x.name}</div>
    `).join('');
}

function render(){

  renderTabs();

  const session = SESSIONS[s];

  document.getElementById('content').innerHTML =
    session.ex.map(e=>`
      <div class="card">
        <div class="row">
          <div>
            <div class="name">${e.name}</div>
            <div class="meta">${e.sets}</div>
          </div>
          <div class="wt">
            ${e.w ? e.w[w] + ' kg' : ''}
          </div>
        </div>
      </div>
    `).join('');

  document.getElementById('week').innerText =
    `${w+1} / 35`;
}

render();

</script>

</body>
</html>
